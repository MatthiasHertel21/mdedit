services:
  mdedit:
    image: mdedit-app:latest
    container_name: mdedit-app
    restart: unless-stopped
    ports:
      - "3211:3210"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3210
      - COOKIE_SECRET=${COOKIE_SECRET:-}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-300}
      - MAX_PASTES_PER_SESSION=${MAX_PASTES_PER_SESSION:-100}
      - MAX_CONCURRENT_EXPORTS=${MAX_CONCURRENT_EXPORTS:-3}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-180}
      - USER_QUOTA_MB=${USER_QUOTA_MB:-50}
      - DISK_WARN_PERCENT=${DISK_WARN_PERCENT:-10}
      - DISK_CRITICAL_PERCENT=${DISK_CRITICAL_PERCENT:-5}
      - MAX_PASTES_MEDIUM=${MAX_PASTES_MEDIUM:-200}
      - MAX_PASTES_AGGRESSIVE=${MAX_PASTES_AGGRESSIVE:-50}
      - IMAGE_MAX_SIZE_MB=${IMAGE_MAX_SIZE_MB:-10}
      - IMAGE_MAX_TOTAL_MB=${IMAGE_MAX_TOTAL_MB:-50}
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-groq}
      - DEFAULT_AI_MODEL=${DEFAULT_AI_MODEL:-llama-3.3-70b-versatile}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3210/api/pastes', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - mdedit-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mdedit-network:
    driver: bridge