name: Bug report
description: Report a reproducible problem in mdedit.io
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide concrete reproduction steps and note whether you are running mdedit.io locally, in Docker, or behind a reverse proxy.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken or unexpectedly behaving?
      placeholder: A short description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Type ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened in practice?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Editor and preview
        - Outline and navigation
        - Export and print layout
        - Sharing and permalink
        - Collaboration
        - AI features
        - i18n and help texts
        - Deployment and operations
        - Other
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Runtime
      options:
        - Docker Compose
        - Direct Node.js
        - Reverse proxy deployment
        - Hosted instance
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Git tag, release version, or commit hash if known.
      placeholder: 0.2.1 or abc1234
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 135, Firefox 127, Safari 18
  - type: textarea
    id: logs
    attributes:
      label: Console, server logs, or screenshots
      description: Paste relevant output or attach screenshots if available.
      render: shell
